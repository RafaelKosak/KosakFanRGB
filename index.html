<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>fan</title>
    <script>
      window.onerror = function(msg, url, line, col, error) {
        const errText = `Error: ${msg}\nURL: ${url}\nLine: ${line}, Col: ${col}\nStack: ${error ? error.stack : ''}`;
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.inset = '0';
        div.style.background = '#800';
        div.style.color = '#fff';
        div.style.padding = '20px';
        div.style.zIndex = '99999';
        div.style.fontFamily = 'monospace';
        div.style.whiteSpace = 'pre-wrap';
        div.style.overflow = 'auto';
        div.innerText = errText;
        document.body.appendChild(div);
      };
      window.addEventListener('unhandledrejection', function(event) {
        const errText = `Unhandled Rejection: ${event.reason}\nStack: ${event.reason && event.reason.stack ? event.reason.stack : ''}`;
        const div = document.createElement('div');
        div.style.position = 'fixed';
        div.style.inset = '0';
        div.style.background = '#800';
        div.style.color = '#fff';
        div.style.padding = '20px';
        div.style.zIndex = '99999';
        div.style.fontFamily = 'monospace';
        div.style.whiteSpace = 'pre-wrap';
        div.style.overflow = 'auto';
        div.innerText = errText;
        document.body.appendChild(div);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
